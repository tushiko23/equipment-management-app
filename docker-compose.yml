services:
  db:
    image: postgres:16
    env_file: .env
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ports:
        - "5432:5432"
      volumes:
        - 'db-volume:/var/liv/postgressql/data'
  web-app:
    build: .
    working_dir: /ToDo-app 
    environment:
      - POSTGRES_USER: ${POSTGRES_USER}
      - POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      - DATABASE_HOST: db
    depends_on: 
      - db
    tty: true
    stdin_open: true
